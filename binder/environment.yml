# Binder configuration for BMBL Analysis Notebooks
# Allows running workflows in the cloud without installation

name: bmbl-binder
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  
  # Jupyter
  - jupyterlab
  - notebook
  - nbconvert
  - ipykernel
  
  # Core scientific Python
  - numpy
  - pandas
  - scipy
  - scikit-learn
  
  # Single-cell analysis
  - scanpy
  - anndata
  - leidenalg
  - python-igraph
  
  # Visualization
  - matplotlib
  - seaborn
  - plotly
  
  # R and IRkernel
  - r-base=4.3
  - r-irkernel
  - r-essentials
  - r-tidyverse
  - r-rmarkdown
  
  # R BioConductor
  - bioconductor-biocmanager
  
  # System tools
  - pandoc
  
  - pip:
    - jupyter-rsession-proxy  # RStudio integration
