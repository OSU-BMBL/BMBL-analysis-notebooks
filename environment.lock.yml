# BMBL Analysis Notebooks - Locked Conda Environment
# Exact package versions for full reproducibility
# Generated: April 2026
# 
# Use this file when exact reproducibility is required (e.g., for manuscripts)
# For general use, environment.yml provides more flexibility

name: bmbl-locked
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python version
  - python=3.11.8
  
  # Core scientific Python
  - numpy=1.26.4
  - pandas=2.2.1
  - scipy=1.12.0
  - scikit-learn=1.4.1
  - statsmodels=0.14.1
  
  # Single-cell Python (Scanpy)
  - scanpy=1.10.0
  - anndata=0.10.6
  - leidenalg=0.10.2
  - python-igraph=0.11.4
  - louvain=0.8.1
  - umap-learn=0.5.5
  
  # Jupyter
  - jupyterlab=4.1.5
  - notebook=7.1.2
  - ipykernel=6.29.3
  
  # Visualization
  - matplotlib=3.8.3
  - seaborn=0.13.2
  - plotly=5.19.0
  
  # Bioinformatics tools (exact versions)
  - samtools=1.19.2
  - bedtools=2.31.1
  - bowtie2=2.5.3
  - star=2.7.11b
  - picard=3.1.1
  - fastqc=0.12.1
  - multiqc=1.21
  - trim-galore=0.6.10
  - cutadapt=4.8
  - macs2=2.2.9.1
  - nextflow=23.10.1
  
  # R ecosystem
  - r-base=4.3.2
  - r-essentials=4.3
  - r-devtools=2.4.5
  - r-remotes=2.4.2.1
  - r-tidyverse=2.0.0
  - r-rmarkdown=2.26
  - r-knitr=1.45
  - r-shiny=1.8.0
  - r-plotly=4.10.4
  - r-dt=0.31
  
  # R BioConductor base
  - bioconductor-biocmanager=1.30.22
  - bioconductor-biocversion=3.18.0
  
  # System tools
  - git=2.44.0
  - pandoc=3.1.12
  - wget=1.21.4
  - curl=8.6.0
  - hdf5=1.14.3
  - zstd=1.5.5
  
  # Pip packages (for things not in conda)
  - pip=24.0
  - pip:
    - scrublet==0.2.3
    - scvi-tools==1.1.2
    - celltypist==1.6.2

# Platform-specific notes:
# - This lock file was generated for linux-64
# - macOS (osx-64) may need slight adjustments
# - Use: conda env create -f environment.lock.yml
# - Export your own lock: conda env export --no-builds > my-environment.yml
