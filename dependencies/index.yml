# BMBL Analysis Notebooks - Dependency Index
# 
# This file documents all workflows and their dependencies.
# Machine-readable format for AI agents and automation tools.
#
# Last updated: April 2026

metadata:
  repository: OSU-BMBL/BMBL-analysis-notebooks
  maintainer: Shaopeng Gu
  contact: shaopeng.gu@osumc.edu
  website: https://u.osu.edu/bmbl/

# ========================================
# R PACKAGES BY CATEGORY
# ========================================

r_packages:
  core:
    - Seurat
    - SeuratObject
    - tidyverse
    - dplyr
    - tidyr
    - ggplot2
    - patchwork
    - cowplot
  
  single_cell:
    - harmony          # Batch correction
    - sctransform      # Normalization
    - DoubletFinder    # Doublet detection
    - SingleR          # Cell type annotation
    - SingleCellExperiment
  
  atac:
    - Signac           # Main scATAC-seq package
    - chromVAR         # TF motif activity
    - ArchR            # scATAC-seq analysis framework
    - cisTopic         # Topic modeling
    - cicero           # Cis-regulatory interactions
    - JASPAR2020       # TF motif database
    - TFBSTools        # TFBS tools
  
  spatial:
    - BayesSpace
    - Giotto
    - SpatialExperiment
  
  enrichment:
    - clusterProfiler
    - enrichplot
    - DOSE
    - enrichR
    - org.Hs.eg.db
    - org.Mm.eg.db
    - ReactomePA
  
  ccc:                 # Cell-cell communication
    - CellChat
    - NicheNet
  
  trajectory:
    - monocle3
    - slingshot
  
  utility:
    - SeuratDisk       # H5AD conversion
    - qs               # Fast serialization
    - here             # Path management
    - hdf5r            # HDF5 files
    - Polychrome        # Color palettes

# ========================================
# PYTHON PACKAGES BY CATEGORY
# ========================================

python_packages:
  core:
    - numpy
    - pandas
    - scipy
    - matplotlib
    - seaborn
  
  single_cell:
    - scanpy
    - anndata
    - muon              # Multi-omics
    - scirpy            # Immune repertoire
    - celloracle        # Gene regulatory networks
    - velocyto          # RNA velocity
  
  utilities:
    - mygene            # Gene ID conversion
    - requests           # HTTP requests
    - jupyter

# ========================================
# SYSTEM TOOLS
# ========================================

system_tools:
  alignment:
    - samtools          # BAM/SAM manipulation
    - bedtools2         # Genome arithmetic
    - bwa               # Sequence alignment
    - star              # RNA-seq alignment
    - bowtie2           # Fast alignment
  
  qc:
    - fastqc            # Quality control
    - multiqc           # QC reports
  
  peak_calling:
    - macs2             # ChIP-seq peak calling
    - homer             # Motif discovery
  
  utilities:
    - trim_galore       # Read trimming
    - subread           # FeatureCounts
    - sratoolkit        # SRA download
    - igv               # Genome browser
  
  pipelines:
    - nextflow          # Pipeline runner (for nf-core)

# ========================================
# WORKFLOWS
# ========================================

