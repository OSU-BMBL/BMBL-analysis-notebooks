# ========================================
# USAGE EXAMPLES
# ========================================

usage:
  conda_environment: |
    # Create environment from file
    conda env create -f environment.yml
    conda activate bmbl-workflows
    
    # Or update existing environment
    conda env update -f environment.yml --prune

  osc_setup: |
    # Load OSC modules
    source setup_osc_env.sh
    
    # Then install R packages
    Rscript install_r_packages.R

  workflow_specific: |
    # For individual workflows
    cd scRNAseq_general_workflow/
    Rscript 0_install_packages.R
    # Then follow workflow README
