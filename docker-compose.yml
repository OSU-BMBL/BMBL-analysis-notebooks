# Docker Compose configuration for BMBL Analysis Notebooks
# Provides easy one-command startup for reproducible environments

version: '3.8'

services:
  # Base R environment with RStudio Server
  rstudio:
    build:
      context: .
      dockerfile: Dockerfile
    image: bmbl-analysis-notebooks:latest
    container_name: bmbl-rstudio
    ports:
      - "8787:8787"
    environment:
      - PASSWORD=bmbl2024
      - USERID=1000
      - GROUPID=1000
    volumes:
      # Mount local data directory
      - ./data:/home/rstudio/data
      # Mount outputs directory
      - ./outputs:/home/rstudio/outputs
      # Persist R packages
      - r-packages:/usr/local/lib/R/site-library
    working_dir: /home/rstudio/workspace
    command: /usr/lib/rstudio-server/bin/rserver --server-daemonize 0

  # scRNAseq workflow environment
  scrnaseq:
    build:
      context: .
      dockerfile: docker/scRNAseq/Dockerfile
    image: bmbl-scrnaseq:latest
    container_name: bmbl-scrnaseq
    ports:
      - "8788:8787"
    environment:
      - PASSWORD=bmbl2024
      - USERID=1000
      - GROUPID=1000
    volumes:
      - ./scRNAseq_general_workflow:/home/rstudio/workspace
      - ./data:/home/rstudio/data
      - ./outputs:/home/rstudio/outputs
    command: /usr/lib/rstudio-server/bin/rserver --server-daemonize 0

  # scRNAseq Trajectory (Slingshot) environment
  trajectory:
    build:
      context: .
      dockerfile: docker/trajectory/Dockerfile
    image: bmbl-trajectory:latest
    container_name: bmbl-trajectory
    ports:
      - "8789:8787"
    environment:
      - PASSWORD=bmbl2024
      - USERID=1000
      - GROUPID=1000
    volumes:
      - ./scRNAseq_trajectory_Slingshot:/home/rstudio/workspace
      - ./data:/home/rstudio/data
      - ./outputs:/home/rstudio/outputs
    command: /usr/lib/rstudio-server/bin/rserver --server-daemonize 0

  # scATACseq environment
  scatacseq:
    build:
      context: .
      dockerfile: docker/scATACseq/Dockerfile
    image: bmbl-scatacseq:latest
    container_name: bmbl-scatacseq
    ports:
      - "8790:8787"
    environment:
      - PASSWORD=bmbl2024
      - USERID=1000
      - GROUPID=1000
    volumes:
      - ./scATACseq_general_workflow:/home/rstudio/workspace
      - ./data:/home/rstudio/data
      - ./outputs:/home/rstudio/outputs
    command: /usr/lib/rstudio-server/bin/rserver --server-daemonize 0

  # RNAseq (nfcore) environment
  rnaseq:
    build:
      context: .
      dockerfile: docker/RNAseq/Dockerfile
    image: bmbl-rnaseq:latest
    container_name: bmbl-rnaseq
    ports:
      - "8791:8787"
    environment:
      - PASSWORD=bmbl2024
      - USERID=1000
      - GROUPID=1000
    volumes:
      - ./RNAseq_nfcore_workflow:/home/rstudio/workspace
      - ./data:/home/rstudio/data
      - ./outputs:/home/rstudio/outputs
    command: /usr/lib/rstudio-server/bin/rserver --server-daemonize 0

  # Spatial Transcriptomics environment
  spatial:
    build:
      context: .
      dockerfile: docker/spatial/Dockerfile
    image: bmbl-spatial:latest
    container_name: bmbl-spatial
    ports:
      - "8792:8787"
    environment:
      - PASSWORD=bmbl2024
      - USERID=1000
      - GROUPID=1000
    volumes:
      - ./ST_general_workflow:/home/rstudio/workspace
      - ./data:/home/rstudio/data
      - ./outputs:/home/rstudio/outputs
    command: /usr/lib/rstudio-server/bin/rserver --server-daemonize 0

volumes:
  r-packages:
