name: bmbl-workflows
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python core
  - python>=3.10
  - pip>=21.0

  # Python data science
  - numpy>=1.21
  - pandas>=2.0
  - scipy>=1.10
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.3
  - statsmodels>=0.14

  # Single-cell analysis (Python)
  - scanpy>=1.10
  - anndata>=0.10
  - muon>=0.1.5
  - scirpy>=0.13
  - celloracle>=0.12
  - velocyto-py>=0.17

  # Bioinformatics tools
  - samtools>=1.17
  - bedtools2>=2.31
  - star>=2.7
  - bowtie2>=2.5
  - bwa>=0.7
  - macs2>=2.2
  - fastqc>=0.12
  - multiqc>=1.20
  - trim-galore>=0.6
  - subread>=2.0

  # Genome browsers and viewers
  - igv>=2.16

  # R (base installation)
  - r-base>=4.3

  # R essentials (metapackage for common R packages)
  - r-essentials

  # Key R packages available via conda
  - r-seurat>=5.0
  - r-signac>=1.12
  - r-seuratdisk>=0.0.1

  # Jupyter for notebooks
  - jupyterlab>=4.0
  - ipykernel>=6.0

  # Visualization
  - plotly>=5.0

  # Utilities
  - htslib>=1.17
  - seqkit>=2.5
