project:
  type: "website"
  output-dir: "docs"
  resources:
    - "_Archived/RNAseq_workflow/img/*.png"
  post-render:
    - "bash scripts/ensure-nojekyll.sh"
  render:
    - "index.qmd"
    - "CONTRIBUTING_to_site.md"
    - "rnaseq-workflow.qmd"
execute:
  enabled: false
